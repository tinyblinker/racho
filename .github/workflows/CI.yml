name: Toy Kernel CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential qemu-system-riscv64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: kernel test
        run: cd os && make run

